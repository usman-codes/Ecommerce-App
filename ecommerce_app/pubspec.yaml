name: ecommerce_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: '>=3.4.1 <4.0.0'

#--------------------Pakages----------------
dependencies:
  flutter:
    sdk: flutter

#-----------------Utility pakages------------    


#-----------------Icons------------ 
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.6

#-----------------State Mangement------------
  get: ^4.6.6

#-----------------product Specific------------



#-----------------pakages-End------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true


#-----------------Local_Assets------------

  assets:
    - assets/icons/brands/
    - assets/images/ 
    - assets/logos/

  
#-----------------Fonts------------

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf

          style: italic

        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500 

          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600



    - family: coolvetica
      fonts:
        - asset: assets/fonts/coolvetica_regular_italic.ttf
        - asset: assets/fonts/coolvetica_regular.ttf
          weight: 700
  
  
  
